<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图片拼接工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        :root {
            --primary: #409eff;
            --primary-light: #e8f3ff;
            --primary-hover: #337ecc;
            --danger: #ff4d4f;
            --danger-light: #fff1f0;
            --success: #52c41a;
            --warning: #faad14;
            --gray-100: #f9fafb;
            --gray-200: #f2f3f5;
            --gray-300: #e5e6eb;
            --gray-400: #c9cdd4;
            --gray-600: #86909c;
            --gray-800: #4e5969;
            --gray-900: #1d2129;
            --radius: 12px;
            --shadow: 0 6px 20px rgba(0, 0, 0, 0.08);
            --transition: all 0.25s ease;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --gray-100: #1d2129;
                --gray-200: #2e3238;
                --gray-300: #4e5969;
                --gray-800: #c9cdd4;
                --gray-900: #f2f3f5;
            }
        }

        body {
            max-width: 1000px;
            margin: 30px auto;
            padding: 0 20px;
            background: var(--gray-100);
            color: var(--gray-900);
            line-height: 1.5;
        }

        .container {
            background: #fff;
            padding: 32px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            transition: var(--transition);
        }

        @media (prefers-color-scheme: dark) {
            .container {
                background: #222;
            }
        }

        .header {
            text-align: center;
            margin-bottom: 24px;
        }

        .header h1 {
            font-size: 24px;
            color: var(--gray-900);
            margin-bottom: 8px;
            font-weight: 600;
        }

        .tip {
            color: var(--gray-600);
            font-size: 13px;
            padding: 8px 12px;
            background: var(--primary-light);
            border-radius: 8px;
            display: inline-block;
        }

        .upload-area {
            border: 2px dashed var(--primary);
            border-radius: var(--radius);
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: var(--transition);
            background: var(--primary-light);
            margin-bottom: 24px;
        }

        .upload-area:hover {
            background: #d0e8ff;
            border-color: var(--primary-hover);
        }

        .upload-area h3 {
            color: var(--primary);
            font-size: 18px;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .upload-area p {
            color: var(--gray-600);
            font-size: 14px;
        }

        #file-input {
            display: none;
        }

        .image-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            padding: 16px;
            border: 1px solid var(--gray-300);
            border-radius: var(--radius);
            min-height: 70px;
            margin-bottom: 24px;
            background: var(--gray-100);
        }

        .image-item {
            padding: 8px 12px;
            background: #fff;
            border: 1px solid var(--gray-300);
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            cursor: grab;
            user-select: none;
            transition: var(--transition);
        }

        .image-item:active {
            cursor: grabbing;
        }

        .image-item:hover {
            border-color: var(--primary);
            background: var(--primary-light);
            transform: translateY(-1px);
        }

        .image-item.dragging {
            opacity: 0.6;
            background: var(--primary-light);
            border-color: var(--primary);
        }

        .image-item .filename {
            max-width: 160px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: var(--gray-800);
        }

        .image-item .remove-btn {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            border: none;
            background: var(--danger);
            color: #fff;
            font-size: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
        }

        .image-item .remove-btn:hover {
            background: #e63946;
            transform: scale(1.1);
        }

        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 16px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        .control-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .control-group label {
            font-size: 14px;
            color: var(--gray-800);
        }

        input[type="number"] {
            padding: 8px 12px;
            border: 1px solid var(--gray-300);
            border-radius: 8px;
            width: 90px;
            outline: none;
            transition: var(--transition);
            font-size: 14px;
        }

        input[type="number"]:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(64, 158, 255, 0.15);
        }

        button {
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        button.primary {
            background: var(--primary);
            color: white;
        }

        button.primary:hover {
            background: var(--primary-hover);
        }

        button.primary:disabled {
            background: var(--gray-400);
            cursor: not-allowed;
            transform: none;
        }

        button.gray {
            background: var(--gray-300);
            color: var(--gray-800);
        }

        button.gray:hover {
            background: var(--gray-400);
        }

        button.danger {
            background: var(--danger);
            color: white;
        }

        button.danger:hover {
            background: #e63946;
        }

        .result-area {
            text-align: center;
        }

        .result-image {
            max-width: 100%;
            border-radius: var(--radius);
            border: 1px solid var(--gray-300);
            margin-bottom: 16px;
            box-shadow: var(--shadow);
        }

        .hidden {
            display: none !important;
        }

        .size-tip {
            font-size: 13px;
            padding: 8px 12px;
            border-radius: 8px;
            margin: 0 auto 12px;
            max-width: 90%;
        }

        .size-tip.success {
            background: #f6ffed;
            color: var(--success);
            border: 1px solid #b7eb8f;
        }

        .size-tip.warning {
            background: #fffbe6;
            color: var(--warning);
            border: 1px solid #ffeeba;
        }

        .compress-progress {
            font-size: 13px;
            padding: 10px 14px;
            background: var(--primary-light);
            color: var(--primary);
            border-radius: 8px;
            margin-bottom: 12px;
            border: 1px solid #bae0ff;
        }

        /* 加载项 */
        .loading-item {
            padding: 8px 12px;
            background: var(--primary-light);
            border: 1px solid var(--primary);
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: var(--primary);
            animation: fadeIn 0.2s ease;
        }

        .loading-spinner {
            width: 16px;
            height: 16px;
            border: 2px solid var(--gray-300);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .loading-cancel {
            margin-left: auto;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            border: none;
            background: var(--danger);
            color: white;
            font-size: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 弹窗 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.45);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            backdrop-filter: blur(2px);
            animation: fadeIn 0.2s ease;
        }

        .modal-overlay.hidden {
            display: none;
        }

        .modal {
            background: white;
            padding: 28px;
            border-radius: var(--radius);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.15);
            min-width: 360px;
            max-width: 90%;
            animation: fadeIn 0.25s ease;
        }

        @media (prefers-color-scheme: dark) {
            .modal {
                background: #222;
            }
        }

        .modal h3 {
            font-size: 18px;
            margin-bottom: 20px;
            color: var(--gray-900);
            font-weight: 600;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: var(--gray-800);
            font-size: 14px;
        }

        .form-group input[type="text"] {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid var(--gray-300);
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            transition: var(--transition);
        }

        .form-group input[type="text"]:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(64, 158, 255, 0.15);
        }

        .format-options {
            display: flex;
            gap: 12px;
            margin-top: 8px;
        }

        .format-option {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 10px;
            border: 1px solid var(--gray-300);
            border-radius: 8px;
            cursor: pointer;
            transition: var(--transition);
            font-size: 14px;
        }

        .format-option:hover {
            border-color: var(--primary);
            background: var(--primary-light);
        }

        .format-option.selected {
            border-color: var(--primary);
            background: var(--primary-light);
            color: var(--primary);
            font-weight: 500;
        }

        .modal-buttons {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            margin-top: 24px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🖼️ 图片拼接工具</h1>
            <p class="tip">✅ 复制后直接粘贴 | 📌 拖拽调整顺序 | 📏 自动压缩超大图 | 🚀 纯本地安全使用</p>
        </div>

        <div class="upload-area" id="upload-area">
            <h3>点击 / 粘贴 / 拖拽上传图片</h3>
            <p>支持多张图片，上传后可删除、排序</p>
            <input type="file" id="file-input" accept="image/*" multiple>
        </div>

        <div class="image-list" id="image-list"></div>

        <div class="controls">
            <div class="control-group">
                <label>图片间距：</label>
                <input type="number" id="gap" value="10" min="0" max="50" placeholder="px">
            </div>
            <button id="merge-btn" class="primary" disabled>开始拼接</button>
            <button id="reset-btn" class="gray">重置全部</button>
            <button id="download-btn" class="primary hidden">下载结果</button>
        </div>

        <div class="result-area" id="result-area">
            <div id="compress-progress" class="compress-progress hidden"></div>
            <div id="size-tip" class="size-tip hidden"></div>
            <canvas id="result-canvas" class="result-image hidden"></canvas>
        </div>
    </div>

    <!-- 下载弹窗 -->
    <div class="modal-overlay hidden" id="download-modal">
        <div class="modal">
            <h3>保存拼接图片</h3>
            <div class="form-group">
                <label for="filename-input">文件名称</label>
                <input type="text" id="filename-input" placeholder="请输入文件名">
            </div>
            <div class="form-group">
                <label>图片格式</label>
                <div class="format-options">
                    <label class="format-option selected" data-format="png">
                        <input type="radio" name="format" value="png" checked>
                        PNG（无损清晰）
                    </label>
                    <label class="format-option" data-format="jpg">
                        <input type="radio" name="format" value="jpg">
                        JPG（体积更小）
                    </label>
                </div>
            </div>
            <div class="modal-buttons">
                <button class="gray cancel-btn" id="modal-cancel-btn">取消</button>
                <button class="primary" id="modal-confirm-btn">确认保存</button>
            </div>
        </div>
    </div>

    <script>
        const imageList = [];
        let resultCtx = null;
        let finalImageData = null;
        let finalImageFormat = 'png';
        let isMerging = false;

        const MAX_SIZE_BYTES = 10 * 1024 * 1024;
        const MAX_SINGLE_IMAGE_WIDTH = 3000;
        const MAX_SINGLE_IMAGE_HEIGHT = 4000;
        const LOAD_TIMEOUT = 30000;
        const MAX_CONCURRENT_LOAD = 4;

        const uploadArea = document.getElementById('upload-area');
        const fileInput = document.getElementById('file-input');
        const imageListEl = document.getElementById('image-list');
        const gapInput = document.getElementById('gap');
        const mergeBtn = document.getElementById('merge-btn');
        const downloadBtn = document.getElementById('download-btn');
        const resultCanvas = document.getElementById('result-canvas');
        const resetBtn = document.getElementById('reset-btn');
        const sizeTipEl = document.getElementById('size-tip');
        const compressProgressEl = document.getElementById('compress-progress');
        const downloadModal = document.getElementById('download-modal');
        const filenameInput = document.getElementById('filename-input');
        const modalCancelBtn = document.getElementById('modal-cancel-btn');
        const modalConfirmBtn = document.getElementById('modal-confirm-btn');
        const formatOptions = document.querySelectorAll('.format-option');

        let selectedFormat = 'png';
        const loadingImages = new Map();
        let loadingIdCounter = 0;
        let activeLoads = 0;

        function init() {
            resultCtx = resultCanvas.getContext('2d');
            bindAllEvents();
        }

        function bindAllEvents() {
            uploadArea.addEventListener('click', () => fileInput.click());
            fileInput.addEventListener('change', (e) => handleFiles(e.target.files));
            document.addEventListener('paste', handlePaste);
            mergeBtn.addEventListener('click', mergeImages);
            downloadBtn.addEventListener('click', showDownloadModal);
            resetBtn.addEventListener('click', resetAll);
            modalCancelBtn.addEventListener('click', hideDownloadModal);
            modalConfirmBtn.addEventListener('click', confirmDownload);

            uploadArea.addEventListener('dragover', e => e.preventDefault());
            uploadArea.addEventListener('drop', e => {
                e.preventDefault();
                handleFiles(e.dataTransfer.files);
            });

            formatOptions.forEach(option => {
                option.addEventListener('click', () => {
                    formatOptions.forEach(opt => opt.classList.remove('selected'));
                    option.classList.add('selected');
                    selectedFormat = option.dataset.format;
                    option.querySelector('input[type="radio"]').checked = true;
                });
            });

            downloadModal.addEventListener('click', e => e.target === downloadModal && hideDownloadModal());
            initDragSort();
        }

        function initDragSort() {
            let draggedItem = null;

            imageListEl.addEventListener('mousedown', e => {
                const item = e.target.closest('.image-item');
                if (!item) return;
                draggedItem = item;
                item.classList.add('dragging');
            });

            document.addEventListener('mousemove', e => {
                if (!draggedItem) return;
                const target = document.elementFromPoint(e.clientX, e.clientY);
                const dropItem = target?.closest('.image-item');
                if (dropItem && dropItem !== draggedItem) {
                    const items = Array.from(imageListEl.children).filter(i => i.classList.contains('image-item'));
                    const oldIndex = items.indexOf(draggedItem);
                    const newIndex = items.indexOf(dropItem);
                    if (oldIndex !== newIndex) {
                        const temp = imageList[oldIndex];
                        imageList[oldIndex] = imageList[newIndex];
                        imageList[newIndex] = temp;
                        updateImageListUI();
                        draggedItem = document.querySelectorAll('.image-item')[newIndex];
                        draggedItem.classList.add('dragging');
                    }
                }
            });

            document.addEventListener('mouseup', () => {
                if (draggedItem) {
                    draggedItem.classList.remove('dragging');
                    draggedItem = null;
                }
            });
        }

        function handlePaste(e) {
            const tag = e.target.tagName;
            if (tag === 'INPUT' || tag === 'TEXTAREA' || e.target.isContentEditable) return;

            const files = e.clipboardData?.files;
            if (files && files.length) {
                e.preventDefault();
                handleFiles(files);
            }
        }

        async function handleFiles(files) {
            if (!files?.length) return;
            const validFiles = Array.from(files).filter(f => f.type.startsWith('image/'));

            for (const file of validFiles) {
                while (activeLoads >= MAX_CONCURRENT_LOAD) await new Promise(r => setTimeout(r, 100));
                loadImageFile(file);
            }
        }

        function loadImageFile(file) {
            activeLoads++;
            const reader = new FileReader();
            const loadingId = addLoadingIndicator(file.name);

            reader.onload = async e => {
                try {
                    await addImage(e.target.result, file.name);
                } catch (err) {
                    console.error('加载失败', err);
                } finally {
                    removeLoadingIndicator(loadingId);
                    activeLoads--;
                }
            };

            reader.onerror = () => {
                removeLoadingIndicator(loadingId);
                activeLoads--;
            };

            reader.readAsDataURL(file);
        }

        function addImage(base64, name) {
            return new Promise((resolve) => {
                const img = new Image();
                img.onload = () => {
                    const ratio = Math.min(MAX_SINGLE_IMAGE_WIDTH / img.width, MAX_SINGLE_IMAGE_HEIGHT / img.height, 1);
                    const w = Math.floor(img.width * ratio);
                    const h = Math.floor(img.height * ratio);

                    if (ratio < 1) {
                        const c = document.createElement('canvas');
                        c.width = w; c.height = h;
                        const ctx = c.getContext('2d');
                        ctx.drawImage(img, 0, 0, w, h);
                        img.src = c.toDataURL();
                    }

                    imageList.push({ src: img.src, filename: name, width: w, height: h, img });
                    updateImageListUI();
                    mergeBtn.disabled = imageList.length < 1;
                    resolve();
                };
                img.src = base64;
            });
        }

        function updateImageListUI() {
            const loaders = Array.from(imageListEl.children).filter(c => c.classList.contains('loading-item'));
            imageListEl.innerHTML = '';
            loaders.forEach(el => imageListEl.appendChild(el));

            imageList.forEach((item, i) => {
                const div = document.createElement('div');
                div.className = 'image-item';
                div.innerHTML = `
                    <span class="filename" title="${item.filename}">${item.filename}</span>
                    <button class="remove-btn" data-i="${i}">×</button>
                `;
                div.querySelector('.remove-btn').onclick = e => {
                    imageList.splice(+e.target.dataset.i, 1);
                    updateImageListUI();
                    mergeBtn.disabled = imageList.length < 1;
                };
                imageListEl.appendChild(div);
            });
        }

        function addLoadingIndicator(name) {
            const id = ++loadingIdCounter;
            const el = document.createElement('div');
            el.className = 'loading-item';
            el.innerHTML = `
                <div class="loading-spinner"></div>
                <span>加载中：${name}</span>
                <button class="loading-cancel">×</button>
            `;
            imageListEl.appendChild(el);
            const ctrl = new AbortController();
            loadingImages.set(id, { ctrl, el });
            el.querySelector('.loading-cancel').onclick = () => {
                ctrl.abort(); el.remove(); loadingImages.delete(id);
            };
            return id;
        }

        function removeLoadingIndicator(id) {
            const item = loadingImages.get(id);
            if (item) { item.el.remove(); loadingImages.delete(id); }
        }

        function getBase64Size(b64) {
            const str = b64.split(',')[1] || b64;
            return (str.length * 3 / 4) - (str.match(/=/g) || []).length;
        }

        function scaleCanvas(canvas, scale) {
            const w = Math.floor(canvas.width * scale);
            const h = Math.floor(canvas.height * scale);
            const c = document.createElement('canvas');
            c.width = w; c.height = h;
            const ctx = c.getContext('2d');
            ctx.drawImage(canvas, 0, 0, w, h);
            return c;
        }

        async function smartCompress(canvas) {
            const png = canvas.toDataURL('image/png');
            const pngSize = getBase64Size(png);
            if (pngSize <= MAX_SIZE_BYTES) return { data: png, format: 'png', size: pngSize, compressed: false };

            let current = canvas;
            let quality = 0.9;
            let res = null;

            while (quality > 0.1) {
                const jpg = current.toDataURL('image/jpeg', quality);
                const size = getBase64Size(jpg);
                if (size <= MAX_SIZE_BYTES) {
                    res = { data: jpg, format: 'jpg', size, compressed: true, quality };
                    break;
                }
                quality -= 0.1;
            }

            if (!res) {
                current = scaleCanvas(canvas, 0.7);
                const jpg = current.toDataURL('image/jpeg', 0.7);
                const size = getBase64Size(jpg);
                res = { data: jpg, format: 'jpg', size, compressed: true, scaled: true };
            }

            return res;
        }

        async function mergeImages() {
            if (isMerging || imageList.length < 1) return;
            isMerging = true;
            mergeBtn.disabled = true;
            compressProgressEl.classList.remove('hidden');
            compressProgressEl.textContent = '正在拼接图片...';

            const gap = Math.max(0, parseInt(gapInput.value) || 0);
            const imgs = imageList.map(i => i.img);
            const maxW = Math.max(...imgs.map(i => i.width));
            const totalH = imgs.reduce((s, i) => s + i.height, 0) + gap * (imgs.length - 1);

            resultCanvas.width = maxW;
            resultCanvas.height = totalH;
            resultCtx.clearRect(0, 0, maxW, totalH);

            let y = 0;
            for (const img of imgs) {
                const x = (maxW - img.width) / 2;
                resultCtx.drawImage(img, x, y);
                y += img.height + gap;
                await new Promise(r => setTimeout(r, 10));
            }

            compressProgressEl.textContent = '正在优化图片大小...';
            const result = await smartCompress(resultCanvas);

            finalImageData = result.data;
            finalImageFormat = result.format;
            const mb = (result.size / 1024 / 1024).toFixed(2);

            sizeTipEl.className = 'size-tip ' + (result.compressed ? 'warning' : 'success');
            sizeTipEl.textContent = `✅ 完成 | 格式：${result.format.toUpperCase()} | 大小：${mb}MB`;
            sizeTipEl.classList.remove('hidden');
            resultCanvas.classList.remove('hidden');
            downloadBtn.classList.remove('hidden');
            compressProgressEl.classList.add('hidden');

            isMerging = false;
            mergeBtn.disabled = false;
        }

        function showDownloadModal() {
            if (!finalImageData) return alert('请先拼接图片');
            filenameInput.value = `图片拼接_${Date.now()}`;
            selectedFormat = finalImageFormat;
            formatOptions.forEach(o => {
                o.classList.toggle('selected', o.dataset.format === selectedFormat);
                o.querySelector('input').checked = o.dataset.format === selectedFormat;
            });
            downloadModal.classList.remove('hidden');
        }

        function hideDownloadModal() {
            downloadModal.classList.add('hidden');
        }

        async function confirmDownload() {
            const name = filenameInput.value.trim().replace(/[\\/:*?"<>|]/g, '_');
            if (!name) return alert('请输入文件名');

            hideDownloadModal();
            const url = finalImageData;
            const a = document.createElement('a');
            a.download = `${name}.${selectedFormat}`;
            a.href = url;
            a.click();
        }

        function resetAll() {
            imageList.length = 0;
            finalImageData = null;
            updateImageListUI();
            resultCanvas.classList.add('hidden');
            downloadBtn.classList.add('hidden');
            sizeTipEl.classList.add('hidden');
            compressProgressEl.classList.add('hidden');
            mergeBtn.disabled = true;
            gapInput.value = 10;
            resultCtx.clearRect(0, 0, resultCanvas.width, resultCanvas.height);
        }

        init();
    </script>
</body>
</html>
