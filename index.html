<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图片拼接工具</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
        body { max-width: 1000px; margin: 0 auto; padding: 20px; background: #f5f5f5; }
        .container { background: white; padding: 25px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #333; margin-bottom: 20px; font-size: 22px; }
        .upload-area { border: 2px dashed #409eff; border-radius: 6px; padding: 30px 15px; text-align: center; 
                       margin-bottom: 20px; cursor: pointer; transition: all 0.2s; }
        .upload-area:hover { background: #f0f7ff; }
        .upload-area h3 { color: #409eff; margin-bottom: 8px; font-size: 18px; }
        .upload-area p { color: #666; font-size: 14px; }
        #file-input { display: none; }
        .controls { display: flex; justify-content: center; align-items: center; gap: 15px; margin-bottom: 20px; flex-wrap: wrap; }
        .control-group { display: flex; align-items: center; gap: 6px; }
        label { color: #333; font-size: 14px; }
        input[type="number"] { padding: 6px 10px; border: 1px solid #ddd; border-radius: 4px; width: 80px; }
        button { padding: 8px 20px; background: #409eff; color: white; border: none; border-radius: 4px; 
                 cursor: pointer; font-size: 14px; transition: background 0.2s; }
        button:hover { background: #337ecc; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        .image-list { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; min-height: 30px; padding: 10px; border: 1px solid #eee; border-radius: 4px; }
        .image-item { padding: 6px 10px; background: #f8f9fa; border: 1px solid #ddd; border-radius: 4px; 
                      display: flex; align-items: center; gap: 6px; font-size: 14px; cursor: move;
                      user-select: none; transition: all 0.2s; }
        .image-item:hover { background: #f0f7ff; border-color: #409eff; }
        .image-item.dragging { opacity: 0.7; background: #e6f7ff; border-color: #1890ff; }
        .image-item .filename { max-width: 180px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #333; }
        .image-item .remove-btn { background: #ff4949; color: white; border: none; border-radius: 3px; width: 20px; height: 20px; 
                                  font-size: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; padding: 0; }
        .result-area { text-align: center; }
        .result-image { max-width: 100%; border: 1px solid #eee; border-radius: 4px; margin-bottom: 15px; }
        .hidden { display: none; }
        .tip { color: #ff6600; text-align: center; font-size: 13px; margin: 10px 0; }
        .size-tip { color: #409eff; text-align: center; font-size: 13px; margin: 5px 0; }
        .size-tip.success { color: #52c41a; }
        .size-tip.warning { color: #ff6600; }
        #reset-btn { background: #666; }
        #reset-btn:hover { background: #444; }
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-overlay.hidden { display: none; }
        .modal {
            background: white;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
            min-width: 350px;
            max-width: 90%;
        }
        .modal h3 {
            color: #333;
            margin-bottom: 20px;
            font-size: 18px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 6px;
            color: #333;
            font-size: 14px;
            font-weight: bold;
        }
        .form-group input[type="text"] {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
            box-sizing: border-box;
        }
        .format-options {
            display: flex;
            gap: 15px;
            margin-top: 8px;
        }
        .format-option {
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            transition: all 0.2s;
        }
        .format-option:hover {
            border-color: #409eff;
            background: #f0f7ff;
        }
        .format-option.selected {
            border-color: #409eff;
            background: #e6f7ff;
        }
        .format-option input[type="radio"] {
            margin: 0;
            cursor: pointer;
        }
        .modal-buttons {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 20px;
        }
        .modal-buttons .cancel-btn {
            background: #909399;
        }
        .modal-buttons .cancel-btn:hover {
            background: #73767a;
        }
        .loading-item {
            padding: 6px 10px;
            background: #f0f7ff;
            border: 1px solid #409eff;
            border-radius: 4px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: #409eff;
        }
        .loading-spinner {
            width: 16px;
            height: 16px;
            border: 2px solid #e0e0e0;
            border-top-color: #409eff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .loading-text {
            color: #666;
            font-size: 13px;
        }
        .loading-cancel {
            background: #ff4949;
            color: white;
            border: none;
            border-radius: 3px;
            width: 20px;
            height: 20px;
            font-size: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            margin-left: auto;
        }
        .loading-cancel:hover {
            background: #e63e3e;
        }
        .compress-progress {
            color: #409eff;
            font-size: 13px;
            margin-top: 5px;
            padding: 8px;
            background: #f0f7ff;
            border-radius: 4px;
            border: 1px solid #b3d8ff;
        }
        .compress-progress .highlight {
            color: #ff6600;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>图片拼接工具</h1>
        <p class="tip">✅ 复制 → 直接粘贴即可使用 | 📌 可拖动调整图片顺序 | 📏 优先保证画质，自动压缩至10MB以内</p>
        
        <div class="upload-area" id="upload-area">
            <h3>点击上传图片 | 复制飞书图片后直接粘贴</h3>
            <p>支持多张图片，粘贴/上传后可删除不需要的图片</p>
            <input type="file" id="file-input" accept="image/*" multiple>
        </div>

        <div class="image-list" id="image-list"></div>

        <div class="controls">
            <div class="control-group">
                <label>图片间距：</label>
                <input type="number" id="gap" value="10" min="0" max="50" placeholder="px">
            </div>
            <button id="merge-btn" disabled>开始拼接</button>
            <button id="reset-btn">重置全部</button> 
            <button id="download-btn" class="hidden">下载拼接结果</button>
        </div>

        <div class="result-area" id="result-area">
            <canvas id="result-canvas" class="result-image hidden"></canvas>
            <div id="size-tip" class="size-tip hidden"></div>
            <div id="compress-progress" class="compress-progress hidden"></div>
        </div>
    </div>

    <!-- 下载弹窗 -->
    <div class="modal-overlay hidden" id="download-modal">
        <div class="modal">
            <h3>下载图片</h3>
            <div class="form-group">
                <label for="filename-input">文件名：</label>
                <input type="text" id="filename-input" placeholder="请输入文件名">
            </div>
            <div class="form-group">
                <label>图片格式：</label>
                <div class="format-options">
                    <label class="format-option selected" data-format="png">
                        <input type="radio" name="format" value="png" checked>
                        PNG（无损）
                    </label>
                    <label class="format-option" data-format="jpg">
                        <input type="radio" name="format" value="jpg">
                        JPG（体积小）
                    </label>
                </div>
            </div>
            <div class="modal-buttons">
                <button class="cancel-btn" id="modal-cancel-btn">取消</button>
                <button id="modal-confirm-btn">确认下载</button>
            </div>
        </div>
    </div>

    <script>
        const imageList = [];
        let resultCtx = null;
        let finalImageData = null;
        let finalImageFormat = 'png';
        let draggingIndex = -1;
        let dragOverIndex = -1;

        const MAX_SIZE_BYTES = 10 * 1024 * 1024;

        const uploadArea = document.getElementById('upload-area');
        const fileInput = document.getElementById('file-input');
        const imageListEl = document.getElementById('image-list');
        const gapInput = document.getElementById('gap');
        const mergeBtn = document.getElementById('merge-btn');
        const downloadBtn = document.getElementById('download-btn');
        const resultCanvas = document.getElementById('result-canvas');
        const resetBtn = document.getElementById('reset-btn');
        const sizeTipEl = document.getElementById('size-tip');
        const compressProgressEl = document.getElementById('compress-progress');
        const downloadModal = document.getElementById('download-modal');
        const filenameInput = document.getElementById('filename-input');
        const modalCancelBtn = document.getElementById('modal-cancel-btn');
        const modalConfirmBtn = document.getElementById('modal-confirm-btn');
        const formatOptions = document.querySelectorAll('.format-option');
        let selectedFormat = 'png';
        const loadingImages = new Map();
        let loadingIdCounter = 0;
        const LOAD_TIMEOUT = 30000;

        function init() {
            resultCtx = resultCanvas.getContext('2d');
            bindAllEvents();
        }

        function bindAllEvents() {
            uploadArea.addEventListener('click', () => fileInput.click());
            fileInput.addEventListener('change', (e) => handleFiles(e.target.files));
            document.addEventListener('paste', handlePaste);
            uploadArea.addEventListener('dragover', (e) => {
                e.preventDefault();
                uploadArea.style.background = '#f0f7ff';
            });
            uploadArea.addEventListener('dragleave', () => {
                uploadArea.style.background = 'white';
            });
            uploadArea.addEventListener('drop', (e) => {
                e.preventDefault();
                uploadArea.style.background = 'white';
                handleFiles(e.dataTransfer.files);
            });
            mergeBtn.addEventListener('click', mergeImages);
            downloadBtn.addEventListener('click', showDownloadModal);
            resetBtn.addEventListener('click', resetAll);
            modalCancelBtn.addEventListener('click', hideDownloadModal);
            modalConfirmBtn.addEventListener('click', confirmDownload);
            formatOptions.forEach(option => {
                option.addEventListener('click', () => {
                    formatOptions.forEach(opt => opt.classList.remove('selected'));
                    option.classList.add('selected');
                    selectedFormat = option.dataset.format;
                    option.querySelector('input[type="radio"]').checked = true;
                });
            });
            downloadModal.addEventListener('click', (e) => {
                if (e.target === downloadModal) {
                    hideDownloadModal();
                }
            });
            bindDragEvents();
        }

        function bindDragEvents() {
            imageListEl.addEventListener('mousedown', (e) => {
                const item = e.target.closest('.image-item');
                if (!item) return;
                draggingIndex = parseInt(item.querySelector('.remove-btn').dataset.index);
                item.classList.add('dragging');
                
                const handleMouseMove = (e) => {
                    e.preventDefault();
                    const hoverItem = document.elementFromPoint(e.clientX, e.clientY)?.closest('.image-item');
                    if (!hoverItem) {
                        dragOverIndex = -1;
                        return;
                    }
                    dragOverIndex = parseInt(hoverItem.querySelector('.remove-btn').dataset.index);
                    if (draggingIndex !== -1 && dragOverIndex !== -1 && draggingIndex !== dragOverIndex) {
                        [imageList[draggingIndex], imageList[dragOverIndex]] = [imageList[dragOverIndex], imageList[draggingIndex]];
                        updateImageListUI();
                        draggingIndex = dragOverIndex;
                    }
                };

                const handleMouseUp = () => {
                    const draggingItem = document.querySelector('.image-item.dragging');
                    if (draggingItem) draggingItem.classList.remove('dragging');
                    draggingIndex = -1;
                    dragOverIndex = -1;
                    document.removeEventListener('mousemove', handleMouseMove);
                    document.removeEventListener('mouseup', handleMouseUp);
                };

                document.addEventListener('mousemove', handleMouseMove);
                document.addEventListener('mouseup', handleMouseUp);
            });
        }

        function handlePaste(e) {
            const target = e.target;
            if (target.tagName === 'INPUT' || target.tagName === 'TEXTAREA' || target.isContentEditable) {
                return;
            }

            const clipboardData = e.clipboardData || window.clipboardData;
            if (!clipboardData) return;

            const hasImageFiles = clipboardData.files && clipboardData.files.length > 0 && 
                Array.from(clipboardData.files).some(f => f.type.startsWith('image/'));
            
            if (hasImageFiles) {
                e.preventDefault();
                handleFeishuPaste(clipboardData);
                return;
            }

            const types = clipboardData.types || [];
            const hasHtml = types.includes('text/html');
            const hasPlainText = types.includes('text/plain');

            if (hasHtml && !hasPlainText) {
                e.preventDefault();
                handleFeishuPaste(clipboardData);
                return;
            }

            if (hasHtml && hasPlainText) {
                let plainText = '';
                const items = clipboardData.items || [];
                for (let item of items) {
                    if (item.kind === 'string' && item.type === 'text/plain') {
                        item.getAsString((text) => {
                            plainText = text;
                        });
                        break;
                    }
                }
                if (!plainText || plainText.trim() === '') {
                    e.preventDefault();
                    handleFeishuPaste(clipboardData);
                    return;
                }
                return;
            }
        }

        async function handleFeishuPaste(clipboardData) {
            try {
                if (clipboardData.files && clipboardData.files.length > 0) {
                    handleFiles(clipboardData.files);
                    return;
                }

                const htmlData = await getClipboardHtml(clipboardData);
                if (!htmlData) return;

                const imgMatches = htmlData.match(/<img[^>]*src=["']([^"']+)["']/gi);
                if (!imgMatches) return;

                const imageUrls = [];
                for (const match of imgMatches) {
                    const src = match.match(/src=["']([^"']+)["']/)[1];
                    if (src) {
                        imageUrls.push(src);
                    }
                }

                if (imageUrls.length === 0) return;

                const loadPromises = imageUrls.map(async (src, index) => {
                    const filename = `飞书图片_${Date.now()}_${index + 1}.png`;
                    const loadingId = addLoadingIndicator(filename);

                    try {
                        const imageData = await convertFeishuImageToBase64(src, loadingId);
                        if (imageData) {
                            await addImageToGallery(imageData, filename);
                        }
                    } catch (err) {
                        if (err.name !== 'AbortError') {
                            console.error('图片加载失败:', err);
                            alert(`图片加载失败：${err.message}`);
                        }
                    } finally {
                        removeLoadingIndicator(loadingId);
                    }
                });

                await Promise.all(loadPromises);
            } catch (err) {
                console.error('粘贴失败:', err);
                alert('飞书图片粘贴失败，请重试（建议复制单元格图片后直接粘贴）');
            }
        }

        function getClipboardHtml(clipboardData) {
            return new Promise((resolve) => {
                const items = clipboardData.items || [];
                for (let item of items) {
                    if (item.kind === 'string' && item.type === 'text/html') {
                        item.getAsString(resolve);
                        return;
                    }
                }
                resolve(null);
            });
        }

        async function convertFeishuImageToBase64(src, loadingId) {
            if (src.startsWith('data:image/')) {
                return src;
            }

            if (src.includes('feishu.cn') || src.includes('larksuite.com')) {
                const loading = loadingImages.get(loadingId);
                const signal = loading ? loading.controller.signal : undefined;

                const timeoutPromise = new Promise((_, reject) => {
                    setTimeout(() => {
                        reject(new Error('图片加载超时，请重试'));
                    }, LOAD_TIMEOUT);
                });

                const fetchPromise = (async () => {
                    const response = await fetch(src, {
                        method: 'GET',
                        headers: {
                            'Referer': 'https://www.feishu.cn/',
                            'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36'
                        },
                        mode: 'cors',
                        cache: 'no-cache',
                        signal: signal
                    });

                    if (!response.ok) throw new Error('图片获取失败');
                    
                    const contentLength = response.headers.get('content-length');
                    const reader = response.body.getReader();
                    const chunks = [];
                    let received = 0;

                    while (true) {
                        const { done, value } = await reader.read();
                        if (done) break;
                        chunks.push(value);
                        received += value.length;
                        
                        if (loading && contentLength) {
                            const percent = Math.round((received / contentLength) * 100);
                            const textEl = loading.element.querySelector('.loading-text');
                            if (textEl) {
                                const filename = textEl.textContent.replace(/正在加载：|（\d+%）/g, '').trim();
                                textEl.textContent = `正在加载：${filename}（${percent}%）`;
                            }
                        }
                    }

                    const blob = new Blob(chunks, { type: response.headers.get('content-type') || 'image/png' });
                    return new Promise((resolve) => {
                        const reader = new FileReader();
                        reader.onload = () => resolve(reader.result);
                        reader.readAsDataURL(blob);
                    });
                })();

                return Promise.race([fetchPromise, timeoutPromise]);
            }

            return null;
        }

        function handleFiles(files) {
            if (!files || files.length === 0) return;
            Array.from(files).forEach(file => {
                if (!file.type.startsWith('image/')) return;
                const reader = new FileReader();
                reader.onload = (e) => addImageToGallery(e.target.result, file.name);
                reader.readAsDataURL(file);
            });
        }

        function addImageToGallery(imageBase64, filename) {
            return new Promise((resolve) => {
                const img = new Image();
                img.crossOrigin = 'anonymous';
                img.onload = () => {
                    imageList.push({
                        src: imageBase64,
                        filename: filename,
                        width: img.width,
                        height: img.height,
                        img: img
                    });
                    updateImageListUI();
                    mergeBtn.disabled = imageList.length < 1;
                    resolve();
                };
                img.onerror = () => {
                    resolve();
                };
                img.src = imageBase64;
            });
        }

        function updateImageListUI() {
            const loadingElements = [];
            const children = Array.from(imageListEl.children);
            children.forEach(child => {
                if (child.classList.contains('loading-item')) {
                    loadingElements.push(child);
                }
            });
            
            imageListEl.innerHTML = '';
            
            loadingElements.forEach(el => {
                imageListEl.appendChild(el);
            });
            
            imageList.forEach((item, index) => {
                const itemEl = document.createElement('div');
                itemEl.className = 'image-item';
                itemEl.innerHTML = `
                    <span class="filename" title="${item.filename}">${item.filename}</span>
                    <button class="remove-btn" data-index="${index}">×</button>
                `;
                itemEl.querySelector('.remove-btn').addEventListener('click', (e) => {
                    const idx = parseInt(e.target.dataset.index);
                    imageList.splice(idx, 1);
                    updateImageListUI();
                    mergeBtn.disabled = imageList.length < 1;
                });
                imageListEl.appendChild(itemEl);
            });
        }

        function getBase64Size(base64Str) {
            const base64WithoutPrefix = base64Str.split(',')[1] || base64Str;
            const padding = (base64WithoutPrefix.match(/=/g) || []).length;
            const sizeInBytes = (base64WithoutPrefix.length * 3 / 4) - padding;
            return sizeInBytes;
        }

        /**
         * 优先保证画质的压缩策略：从高质量开始尝试，找到能满足10MB限制的最高质量
         */
        function qualityPriorityCompress(canvas, targetSizeBytes = MAX_SIZE_BYTES) {
            return new Promise((resolve) => {
                // 第一步：尝试PNG无损格式
                const pngData = canvas.toDataURL('image/png', 1.0);
                const pngSize = getBase64Size(pngData);
                
                // PNG已经小于目标大小，直接使用PNG（画质最好）
                if (pngSize <= targetSizeBytes) {
                    resolve({
                        data: pngData,
                        format: 'png',
                        quality: 1.0,
                        size: pngSize,
                        compressed: false
                    });
                    return;
                }

                // PNG超过目标大小，使用JPG从高质量开始尝试
                // 从0.95开始，逐步降低，找到满足大小限制的最高质量
                const qualitySteps = [0.95, 0.92, 0.88, 0.85, 0.82, 0.78, 0.75, 0.72, 0.68, 0.65, 0.62, 0.58, 0.55, 0.50, 0.45, 0.40, 0.35, 0.30, 0.25, 0.20];
                
                let bestResult = null;
                
                for (let i = 0; i < qualitySteps.length; i++) {
                    const q = qualitySteps[i];
                    const jpgData = canvas.toDataURL('image/jpeg', q);
                    const size = getBase64Size(jpgData);
                    
                    // 更新进度
                    updateCompressProgress(i + 1, qualitySteps.length, q, size / 1024 / 1024);
                    
                    if (size <= targetSizeBytes) {
                        // 找到满足条件的最高质量
                        bestResult = {
                            data: jpgData,
                            format: 'jpg',
                            quality: q,
                            size: size,
                            compressed: true
                        };
                        break;
                    }
                    
                    // 如果已经到了最低质量还不行，使用最低质量
                    if (i === qualitySteps.length - 1) {
                        bestResult = {
                            data: jpgData,
                            format: 'jpg',
                            quality: q,
                            size: size,
                            compressed: true
                        };
                    }
                }

                // 如果还是没找到（理论上不会发生），使用最低质量
                if (!bestResult) {
                    const fallbackData = canvas.toDataURL('image/jpeg', 0.15);
                    bestResult = {
                        data: fallbackData,
                        format: 'jpg',
                        quality: 0.15,
                        size: getBase64Size(fallbackData),
                        compressed: true
                    };
                }

                resolve(bestResult);
            });
        }

        function updateCompressProgress(current, total, quality, sizeMB) {
            compressProgressEl.classList.remove('hidden');
            const status = sizeMB <= 10 ? '✅ 已满足' : '⏳ 压缩中';
            compressProgressEl.innerHTML = `
                ${status} 尝试 ${current}/${total}，质量：<span class="highlight">${(quality * 100).toFixed(0)}%</span>，当前大小：<span class="highlight">${sizeMB.toFixed(2)}MB</span>
                ${sizeMB <= 10 ? ' 🎉 已低于10MB！' : ''}
            `;
        }

        async function mergeImages() {
            const gap = parseInt(gapInput.value) || 0;
            const images = imageList.map(item => item.img);

            if (images.length < 1) {
                alert('请至少添加1张图片再拼接');
                return;
            }

            // 计算画布尺寸
            const maxWidth = Math.max(...images.map(img => img.width));
            const totalHeight = images.reduce((sum, img) => sum + img.height, 0) + (images.length > 1 ? gap * (images.length - 1) : 0);

            // 绘制图片
            resultCanvas.width = maxWidth;
            resultCanvas.height = totalHeight;
            resultCtx.clearRect(0, 0, maxWidth, totalHeight);

            let y = 0;
            images.forEach(img => {
                const x = (maxWidth - img.width) / 2;
                resultCtx.drawImage(img, x, y, img.width, img.height);
                if (images.length > 1) {
                    y += img.height + gap;
                } else {
                    y += img.height;
                }
            });

            // 隐藏之前的提示
            compressProgressEl.classList.add('hidden');
            sizeTipEl.classList.add('hidden');

            // 使用优先画质的压缩策略
            const result = await qualityPriorityCompress(resultCanvas, MAX_SIZE_BYTES);
            
            finalImageData = result.data;
            finalImageFormat = result.format;
            const sizeMB = result.size / 1024 / 1024;
            const targetMB = MAX_SIZE_BYTES / 1024 / 1024;

            // 构建提示信息
            let sizeTip = '';
            let tipClass = '';
            
            if (result.format === 'png') {
                sizeTip = `✅ 拼接完成！PNG无损格式，大小：${sizeMB.toFixed(2)}MB（未压缩）`;
                tipClass = 'success';
            } else if (result.size <= MAX_SIZE_BYTES) {
                const qualityPercent = (result.quality * 100).toFixed(0);
                sizeTip = `✅ 拼接完成！JPG格式（质量 ${qualityPercent}%），大小：${sizeMB.toFixed(2)}MB（已控制在 ${targetMB}MB 以内）`;
                tipClass = 'success';
            } else {
                sizeTip = `⚠️ 图片大小 ${sizeMB.toFixed(2)}MB 仍略大于 ${targetMB}MB，已使用最低质量压缩（可尝试减少图片数量）`;
                tipClass = 'warning';
            }

            // 显示结果
            resultCanvas.classList.remove('hidden');
            downloadBtn.classList.remove('hidden');
            sizeTipEl.textContent = sizeTip;
            sizeTipEl.className = `size-tip ${tipClass}`;
            sizeTipEl.classList.remove('hidden');
            
            // 隐藏进度
            compressProgressEl.classList.add('hidden');
        }

        function showDownloadModal() {
            if (!finalImageData) {
                alert('暂无拼接结果可下载');
                return;
            }
            const defaultName = `飞书图片拼接结果_${Date.now()}`;
            filenameInput.value = defaultName;
            selectedFormat = finalImageFormat;
            formatOptions.forEach(opt => {
                if (opt.dataset.format === selectedFormat) {
                    opt.classList.add('selected');
                    opt.querySelector('input[type="radio"]').checked = true;
                } else {
                    opt.classList.remove('selected');
                    opt.querySelector('input[type="radio"]').checked = false;
                }
            });
            downloadModal.classList.remove('hidden');
            setTimeout(() => filenameInput.focus(), 100);
        }

        function hideDownloadModal() {
            downloadModal.classList.add('hidden');
        }

        async function getImageDataByFormat(format) {
            if (format === finalImageFormat) {
                return finalImageData;
            }
            // 如果格式不同，重新转换
            if (format === 'jpg') {
                // 从高质量开始尝试，保证画质
                const qualities = [0.95, 0.92, 0.88, 0.85, 0.82, 0.78, 0.75, 0.72, 0.68, 0.65];
                for (const q of qualities) {
                    const jpgData = resultCanvas.toDataURL('image/jpeg', q);
                    const size = getBase64Size(jpgData);
                    if (size <= MAX_SIZE_BYTES) {
                        return jpgData;
                    }
                }
                // 如果都不行，使用0.6
                return resultCanvas.toDataURL('image/jpeg', 0.6);
            } else {
                return resultCanvas.toDataURL('image/png', 1.0);
            }
        }

        async function confirmDownload() {
            let fileName = filenameInput.value.trim();
            if (!fileName) {
                alert('请输入文件名');
                filenameInput.focus();
                return;
            }

            fileName = fileName.replace(/[\\/:*?"<>|]/g, '_');
            const fullFileName = `${fileName}.${selectedFormat}`;

            try {
                hideDownloadModal();

                const imageData = await getImageDataByFormat(selectedFormat);

                const link = document.createElement('a');
                link.download = fullFileName;
                link.href = imageData;
                link.style.display = 'none';
                document.body.appendChild(link);
                link.click();
                setTimeout(() => {
                    document.body.removeChild(link);
                }, 1000);
            } catch (err) {
                alert('下载失败，请重试');
                console.error('下载失败:', err);
            }
        }

        function resetAll() {
            cancelAllLoading();
            imageList.length = 0;
            finalImageData = null;
            finalImageFormat = 'png';
            updateImageListUI();
            mergeBtn.disabled = true;
            resultCanvas.classList.add('hidden');
            downloadBtn.classList.add('hidden');
            sizeTipEl.classList.add('hidden');
            compressProgressEl.classList.add('hidden');
            resultCtx.clearRect(0, 0, resultCanvas.width, resultCanvas.height);
            gapInput.value = 10;
        }

        function addLoadingIndicator(filename) {
            const id = ++loadingIdCounter;
            const loadingEl = document.createElement('div');
            loadingEl.className = 'loading-item';
            loadingEl.dataset.loadingId = id;
            loadingEl.innerHTML = `
                <div class="loading-spinner"></div>
                <span class="loading-text">正在加载：${filename}</span>
                <button class="loading-cancel" title="取消加载">×</button>
            `;
            imageListEl.appendChild(loadingEl);
            
            loadingEl.querySelector('.loading-cancel').addEventListener('click', () => {
                cancelLoading(id);
            });
            
            const controller = new AbortController();
            loadingImages.set(id, { controller, element: loadingEl });
            
            return id;
        }

        function removeLoadingIndicator(id) {
            const loading = loadingImages.get(id);
            if (loading) {
                loading.element.remove();
                loadingImages.delete(id);
            }
        }

        function cancelLoading(id) {
            const loading = loadingImages.get(id);
            if (loading) {
                loading.controller.abort();
                removeLoadingIndicator(id);
            }
        }

        function cancelAllLoading() {
            loadingImages.forEach((loading, id) => {
                loading.controller.abort();
                loading.element.remove();
            });
            loadingImages.clear();
        }

        init();
    </script>
</body>
</html>
